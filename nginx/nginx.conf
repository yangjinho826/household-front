# 상류 서버 정의 — 도커 네트워크 안의 컨테이너 이름으로 부름
upstream frontend {
    server frontend:3000;       # 같은 compose 안의 Next.js 컨테이너
}

upstream backend {
    server household-back:8000; # 백엔드 compose 의 FastAPI 컨테이너 (household-net 경유)
}

server {
    listen 80;
    server_name _;              # 어떤 호스트로 와도 받음 (localhost, 공용 IP 모두)

    client_max_body_size 10M;   # 업로드 한도

    # /api/ 로 시작하는 요청은 모두 백엔드로
    # FastAPI 가 root_path="/api" 라서 path 그대로 통과시키면 됨
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 그 외 모든 요청은 Next.js 로
    location / {
        proxy_pass         http://frontend;
        # Next.js 가 컨테이너 내부 포트(3000)로 박은 absolute Location 헤더를 상대 경로로 rewrite
        proxy_redirect     http://localhost:3000/ /;
        proxy_http_version 1.1;

        # WebSocket / Next.js 스트리밍 대비
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
