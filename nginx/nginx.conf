# 상류 서버 정의 — 도커 네트워크 안의 컨테이너 이름으로 부름
upstream frontend {
    server frontend:3000;       # 같은 compose 안의 Next.js 컨테이너
}

upstream backend {
    server household-back:8000; # 백엔드 compose 의 FastAPI 컨테이너 (household-net 경유)
}

# default_server — 호스트 매칭 안 되는 모든 요청(직접 IP, 모르는 도메인)을
# 정상 도메인으로 친절 리다이렉트. 봇이 따라와도 Cloudflare 가 차단.
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    # default 서버도 SSL handshake 는 받아야 하므로 같은 인증서 사용
    # (브라우저는 인증서 subject 와 호스트(IP) 불일치 경고 띄움 — 봇/실수 사용자는 redirect 만 받음)
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/cert.key;

    # Cloudflare Authenticated Origin Pulls — CF 우회 직접 호출 차단
    # default 도 동일하게 verify 안 하면 우회 경로 됨
    ssl_client_certificate /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_verify_client      on;

    return 301 https://household.jinho826.com$request_uri;
}

# 80 으로 들어오면 HTTPS 로 영구 리다이렉트
server {
    listen 80;
    server_name household.jinho826.com;
    return 301 https://$host$request_uri;
}

# 443 — SSL 종료 + 기존 라우팅
server {
    listen 443 ssl;
    http2 on;
    server_name household.jinho826.com;

    # Cloudflare Origin Certificate (host 의 ./nginx/ssl/ 디렉토리 마운트)
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/cert.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Cloudflare Authenticated Origin Pulls — CF 가 보낸 client cert 검증
    # CF 우회한 직접 IP 접근은 cert 없어서 TLS handshake 단계에서 거부
    ssl_client_certificate /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_verify_client      on;

    client_max_body_size 10M;   # 업로드 한도

    # /api/ 로 시작하는 요청은 모두 백엔드로
    # FastAPI 가 root_path="/api" 라서 path 그대로 통과시키면 됨
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;     # 443 으로 받으면 https 로 전달
        proxy_read_timeout 60s;
    }

    # 그 외 모든 요청은 Next.js 로
    location / {
        proxy_pass         http://frontend;
        # Next.js 가 컨테이너 내부 포트(3000)로 박은 absolute Location 헤더를 상대 경로로 rewrite
        # localhost:3000 뿐 아니라 외부 IP:3000 으로 박힌 경우도 모두 처리 (next-intl middleware 등)
        # [^:/]+ 로 콜론도 제외해야 IP:3000 의 :3000 부분 매치됨 ([^/]+ 만 쓰면 greedy 라 실패)
        proxy_redirect     ~^http://[^:/]+:3000/(.*)$ /$1;
        proxy_redirect     http://localhost:3000/ /;
        proxy_http_version 1.1;

        # WebSocket / Next.js 스트리밍 대비
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
