services:
  # ── Next.js (외부 노출 X, nginx 뒤에 숨음) ──
  frontend:
    image: '${DOCKER_IMAGE_NAME:-household-front}:latest'
    container_name: '${DOCKER_CONTAINER_NAME:-household-front}'
    env_file:
      - .env
    environment:
      # SSR 이 백엔드 컨테이너로 직접 부를 때 쓰는 호스트
      BACKEND_URL: "http://household-back:8000"
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: "production"
    networks:
      - web
      - household-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1.6G
        reservations:
          cpus: '0.25'
          memory: 200M
    restart: unless-stopped

  # ── nginx 리버스 프록시 (외부 진입점) ──
  nginx:
    image: nginx:1.27-alpine
    container_name: household-front-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - web
      - household-net
    depends_on:
      - frontend
    restart: unless-stopped

networks:
  web:
  household-net:
    external: true
