services:
  # ── Next.js (외부 노출 X, nginx 뒤에 숨음) ──
  frontend:
    image: '${DOCKER_IMAGE_NAME:-household-front}:latest'
    container_name: '${DOCKER_CONTAINER_NAME:-household-front}'
    env_file:
      - .env
    environment:
      # SSR 이 백엔드 컨테이너로 직접 부를 때 쓰는 호스트
      BACKEND_URL: "http://household-back:8000"
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: "production"
    networks:
      - web
      - household-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1.6G
        reservations:
          cpus: '0.25'
          memory: 200M
    restart: unless-stopped
    # 호스트 부팅 시점 nginx 가 frontend 보다 먼저 떠서 502 내는 사고 방지용.
    # 재배포 다운타임에는 효과 없음 (nginx 는 이미 떠 있고 frontend 만 stop→start).
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  # ── nginx 리버스 프록시 (외부 진입점) ──
  nginx:
    image: nginx:1.27-alpine
    container_name: household-front-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - web
      - household-net
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped
    # JSON access log 를 stdout 으로 받아서 docker 가 호스트에 자동 영속화 + 회전
    # 보관 총량: max-size × max-file = 약 1GB (트래픽 보면서 조정)
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

networks:
  web:
  household-net:
    external: true
